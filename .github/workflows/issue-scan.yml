name: Issue Scan

on:
  schedule:
    - cron: "50 0 * * *"
  workflow_dispatch:

concurrency:
  group: issue-scan
  cancel-in-progress: false

jobs:
  scan:
    permissions:
      issues: write
      contents: read
      id-token: write
    uses: rysk-tanaka/workflows/.github/workflows/issue-scan.yml@771568561936d8c2efc5e713ae5ac10bb851b47c # main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
