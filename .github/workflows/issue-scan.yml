name: Issue Scan

on:
  schedule:
    - cron: "50 0 * * *"
  workflow_dispatch:

concurrency:
  group: issue-scan
  cancel-in-progress: false

jobs:
  scan:
    permissions:
      issues: write
      contents: read
      id-token: write
    uses: rysk-tanaka/workflows/.github/workflows/issue-scan.yml@5358522bd5bda6ef1f0df0d61500389b721ec7be # main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
